<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1b4b" />
    <title>数据库管理 · 小熊简历筛选</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/jianli/static/styles.css" />
    <link rel="stylesheet" href="/jianli/static/admin.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>

    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 4c-2.5 0-4.2 1.6-5 3.5-.9-.3-2-.1-2.7.8-.8 1-.7 2.4.2 3.3.1 3.5 2.2 6.4 5.5 7.4.3.1.7.1 1 0 3.3-1 5.4-3.9 5.5-7.4.9-.9 1-2.3.2-3.3-.7-.9-1.8-1.1-2.7-.8C16.2 5.6 14.5 4 12 4z"
                fill="currentColor"
                opacity=".95"
              />
              <circle cx="9" cy="11" r="1" fill="#fff" />
              <circle cx="15" cy="11" r="1" fill="#fff" />
            </svg>
          </span>
          <div class="brand-text">
            <span class="logo">数据库管理</span>
            <span class="subtitle">表数据维护 · SQL 查询与更新</span>
          </div>
        </div>
        <a href="/jianli/" class="btn btn-ghost btn-sm">返回工作台</a>
      </div>
    </header>

    <main class="admin-main">
      <div class="section-head" style="margin-bottom: 1rem">
        <p class="section-eyebrow">SQLite</p>
        <h2 class="section-title">数据概览</h2>
      </div>

      <div class="panel admin-panel">
        <div class="panel-inner">
          <div id="admin-meta" class="admin-meta">
            <p class="admin-meta-row">加载中…</p>
          </div>
          <button type="button" id="btn-refresh" class="btn btn-ghost btn-sm">刷新概览</button>
        </div>
      </div>

      <div class="panel admin-panel">
        <div class="panel-inner">
          <h3 class="admin-section-title">SQL 控制台</h3>
          <p class="admin-sql-hint">
            每次执行<strong>一条</strong>语句。支持 <code>SELECT</code> 以及会改库的 <code>INSERT</code> / <code>UPDATE</code> /
            <code>DELETE</code> 等（成功后会自动提交）。勿在公网暴露本页；可通过环境变量
            <code>ADMIN_SQL_DISABLE=1</code> 关闭此接口。
          </p>
          <textarea id="sql-input" class="admin-sql-area" spellcheck="false" placeholder="SELECT * FROM folders LIMIT 10;"></textarea>
          <div class="admin-sql-actions">
            <button type="button" id="btn-run-sql" class="btn btn-primary btn-sm">执行 SQL</button>
            <button type="button" id="btn-sql-example" class="btn btn-ghost btn-sm">填入示例</button>
            <button type="button" id="btn-copy-init-sql" class="btn btn-ghost btn-sm">复制初始化 SQL</button>
          </div>
          <div id="sql-result" class="admin-sql-result" hidden></div>
        </div>
      </div>

      <div class="admin-folders-grid">
        <div class="panel admin-panel">
          <div class="panel-inner">
            <h3 class="admin-section-title">文件夹 folders</h3>
            <div class="admin-table-wrap">
              <table class="admin-table" id="table-folders">
                <thead>
                  <tr>
                    <th>id</th>
                    <th>名称</th>
                    <th>简历数</th>
                    <th>创建时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="tbody-folders"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="panel admin-panel">
          <div class="panel-inner">
            <h3 class="admin-section-title">筛选简历列表</h3>
            <div class="admin-toolbar">
              <label>
                文件夹
                <select id="filter-folder">
                  <option value="">全部</option>
                </select>
              </label>
              <button type="button" id="btn-load-resumes" class="btn btn-primary btn-sm">加载</button>
            </div>
            <div class="admin-table-wrap">
              <table class="admin-table" id="table-resumes">
                <thead>
                  <tr>
                    <th>id</th>
                    <th>夹</th>
                    <th>原始文件名</th>
                    <th>存储名</th>
                    <th>下载</th>
                    <th>上传时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="tbody-resumes"></tbody>
              </table>
            </div>
            <div class="admin-pagination">
              <button type="button" id="btn-prev" class="btn btn-ghost btn-sm">上一页</button>
              <span id="page-info"></span>
              <button type="button" id="btn-next" class="btn btn-ghost btn-sm">下一页</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast" role="status"></div>
    <script src="/jianli/static/admin.js"></script>
  </body>
</html>
