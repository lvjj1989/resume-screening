<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1b4b" />
    <title>小熊简历筛选</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>

    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 4c-2.5 0-4.2 1.6-5 3.5-.9-.3-2-.1-2.7.8-.8 1-.7 2.4.2 3.3.1 3.5 2.2 6.4 5.5 7.4.3.1.7.1 1 0 3.3-1 5.4-3.9 5.5-7.4.9-.9 1-2.3.2-3.3-.7-.9-1.8-1.1-2.7-.8C16.2 5.6 14.5 4 12 4z"
                fill="currentColor"
                opacity=".95"
              />
              <circle cx="9" cy="11" r="1" fill="#fff" />
              <circle cx="15" cy="11" r="1" fill="#fff" />
            </svg>
          </span>
          <div class="brand-text">
            <span class="logo">小熊简历筛选</span>
            <span class="subtitle">文件夹 · 上传预览 · 下载统计</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main-shell">
      <section id="view-folders" class="view">
        <div class="section-head">
          <p class="section-eyebrow">工作台</p>
          <h2 class="section-title">简历文件夹</h2>
          <p class="section-desc">按项目或岗位整理简历，未下载数量会醒目提示</p>
        </div>

        <div class="panel panel-create">
          <div class="panel-glow" aria-hidden="true"></div>
          <div class="panel-inner">
            <div class="create-panel-head">
              <span class="create-panel-title">新建业务文件夹</span>
              <span class="create-panel-sub">创建后可在卡片上重命名或删除</span>
            </div>
            <div class="create-row">
            <input
              id="new-folder-name"
              class="input input-lg"
              type="text"
              placeholder="输入文件夹名称，例如：2026 春招-产品"
              maxlength="255"
              autocomplete="off"
            />
            <button type="button" id="btn-create-folder" class="btn btn-primary btn-lg">
              <span class="btn-icon" aria-hidden="true">+</span>
              新建文件夹
            </button>
            </div>
          </div>
        </div>

        <div id="folder-list" class="folder-grid"></div>
      </section>

      <section id="view-resumes" class="view hidden">
        <div class="resume-top">
          <div class="resume-toolbar-strip">
          <div class="toolbar toolbar-spread">
            <button type="button" id="btn-back" class="btn btn-ghost btn-back">
              <span class="btn-chevron" aria-hidden="true">‹</span>
              返回文件夹
            </button>
            <div class="toolbar-end">
              <button type="button" id="btn-rename-folder" class="btn btn-ghost btn-rename">
                重命名
              </button>
              <button type="button" id="btn-delete-folder" class="btn btn-danger-outline">
                删除此文件夹
              </button>
            </div>
          </div>
          </div>

          <div class="resume-hero">
            <div class="resume-hero-icon" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M14 2v6h6M16 13H8M16 17H8M10 9H8"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <div class="resume-hero-text">
              <h1 id="resume-folder-title" class="resume-title"></h1>
              <p id="archive-breadcrumb" class="resume-breadcrumb hidden" aria-live="polite"></p>
              <p id="resume-hint" class="resume-hint">
                列表按<strong>下载次数</strong>优先排序；每次下载会更新计数并自动靠前展示。
              </p>
            </div>
            <label id="resume-upload-label" class="btn btn-primary btn-upload">
              <span class="btn-icon" aria-hidden="true">↑</span>
              上传简历
              <input id="file-upload" type="file" hidden accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.webp" />
            </label>
          </div>
        </div>

        <div class="list-shell">
            <div class="list-shell-head">
            <div class="list-shell-head-main">
              <span id="list-shell-title" class="list-shell-title">简历列表</span>
              <span id="list-shell-hint" class="list-shell-hint">支持 PDF、Word、图片</span>
            </div>
          </div>
          <div class="table-wrap">
            <table id="resume-table" class="resume-table">
              <thead>
                <tr id="resume-thead-row">
                  <th class="col-file">文件</th>
                  <th class="col-num">下载</th>
                  <th class="col-time">上传时间</th>
                  <th class="col-actions">操作</th>
                </tr>
              </thead>
              <tbody id="resume-tbody"></tbody>
            </table>
          </div>
          <div id="resume-cards" class="resume-cards"></div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
      <div id="modal-panel" class="modal">
        <div class="modal-header">
          <h2 id="modal-title">预览</h2>
          <button type="button" id="modal-close" class="btn btn-close" aria-label="关闭">×</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <div id="toast" class="toast" role="status"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
